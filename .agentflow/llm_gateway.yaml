gateway:
  default_role: reasoning
  request_timeout_seconds: 120
  max_retries: 2
providers:
- name: openai
  api_base: https://api.openai.com/v1
  api_key_env: OPENAI_API_KEY
  models: []
  enabled: true
- name: anthropic
  api_base: https://api.anthropic.com
  api_key_env: ANTHROPIC_API_KEY
  models: []
  enabled: true
- name: google
  api_base: https://generativelanguage.googleapis.com
  api_key_env: GEMINI_API_KEY
  models: []
  enabled: true
- name: local
  api_base: http://127.0.0.1:11434/v1
  api_key_env: null
  models: []
  enabled: true
inference_engines:
- name: vllm
  engine_type: vllm
  base_url: http://127.0.0.1:18001
  health_path: /health
  metrics_path: /metrics
  model_list_path: /v1/models
  enabled: true
  deployment_mode: docker
  docker_image: vllm/vllm-openai:v0.8.5
  served_model_name: Qwen/Qwen2.5-0.5B-Instruct
  container_name: llm-vllm
  host_port: 18001
  public_base_url: http://127.0.0.1:18001
  gpu_enabled: true
  gpu_devices:
  - '0'
  gpu_count: 1
  extra_env:
    HF_HOME: /root/.cache/huggingface
- name: sglang
  engine_type: sglang
  base_url: http://127.0.0.1:18002
  health_path: /health
  metrics_path: /metrics
  model_list_path: /v1/models
  enabled: true
  deployment_mode: docker
  docker_image: lmsysorg/sglang:v0.4.9.post4-cu126
  served_model_name: Qwen/Qwen2.5-0.5B-Instruct
  container_name: llm-sglang
  host_port: 18002
  public_base_url: null
  gpu_enabled: true
  gpu_devices:
  - '0'
  gpu_count: 1
  extra_env:
    HF_HOME: /root/.cache/huggingface
- name: tgi
  engine_type: tgi
  base_url: http://127.0.0.1:18003
  health_path: /health
  metrics_path: /metrics
  model_list_path: /v1/models
  enabled: true
  deployment_mode: docker
  docker_image: ghcr.io/huggingface/text-generation-inference:3.3.7
  served_model_name: Qwen/Qwen2.5-0.5B-Instruct
  container_name: llm-tgi
  host_port: 18003
  public_base_url: null
  gpu_enabled: true
  gpu_devices:
  - '0'
  gpu_count: 1
  extra_env:
    HF_HOME: /data
models:
- alias: reasoning_claude
  model_id: reasoning_claude
  provider: anthropic
  model: claude-sonnet-4-6
  model_type: text
  api_base: null
  api_key_env: null
  engine: null
  enabled: true
  modalities:
  - text
  - tool_call
  quality_score: 0.95
  avg_latency_ms: 1200.0
  cost:
    input_per_1k: 0.003
    output_per_1k: 0.015
