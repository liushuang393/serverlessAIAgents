registry:
  reasoning: reasoning_claude
  coding: coding_openai
  cheap: cheap_gemini
  local: local_vllm_default
routing_policy:
  priority: latency
  fallback_chain:
    reasoning:
    - coding_openai
    - cheap_gemini
    - local_vllm_default
    coding:
    - reasoning_claude
    - cheap_gemini
    - local_vllm_default
    cheap:
    - coding_openai
    - local_vllm_default
    local:
    - cheap_gemini
  load_balance_strategy: round_robin
  cost_budget: null
