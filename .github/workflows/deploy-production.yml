# 本番環境デプロイメントワークフロー
# 注意: 自動実行は無効化されています（workflow_dispatchのみ）
# 手動実行のみを許可しています

name: Deploy to Production

# 自動実行を無効化: workflow_dispatchのみを設定（手動実行のみ）
on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'デプロイ先環境'
        required: true
        default: 'staging'
        type: choice
        options:
          - 'staging'
          - 'production'
      deploy_redis:
        description: 'Redisをデプロイする'
        required: true
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'
      deploy_postgres:
        description: 'PostgreSQLをデプロイする'
        required: true
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'
      deploy_vector_db:
        description: 'ベクトルDBをデプロイする'
        required: true
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'
      run_migrations:
        description: 'データベースマイグレーションを実行する'
        required: true
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'

env:
  PYTHON_VERSION: "3.13"

jobs:
  # ジョブ1: デプロイ前チェック
  pre-deploy-check:
    name: Pre-deployment Check
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[apps,dev]"
      
      - name: Run all tests
        run: |
          pytest tests/ -v --cov=contracts --cov=infrastructure --cov=shared --cov=kernel --cov=harness --cov=control_plane --cov=domain --cov=apps --cov-report=term-missing
      
      - name: Check environment variables
        run: |
          echo "環境: ${{ github.event.inputs.environment }}"
          echo "Redis: ${{ github.event.inputs.deploy_redis }}"
          echo "PostgreSQL: ${{ github.event.inputs.deploy_postgres }}"
          echo "Vector DB: ${{ github.event.inputs.deploy_vector_db }}"
          echo "Migrations: ${{ github.event.inputs.run_migrations }}"
      
      - name: Validate deployment configuration
        run: |
          echo "✅ デプロイ前チェック完了"

  # ジョブ2: Redisデプロイ
  deploy-redis:
    name: Deploy Redis
    runs-on: ubuntu-latest
    needs: pre-deploy-check
    if: ${{ github.event.inputs.deploy_redis == 'true' }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Deploy Redis
        run: |
          echo "🚀 Redisをデプロイしています..."
          echo "環境: ${{ github.event.inputs.environment }}"
          # 実際のデプロイロジックをここに実装
          # 例: docker-compose up -d redis
          echo "✅ Redisデプロイ完了"

  # ジョブ3: PostgreSQLデプロイ
  deploy-postgres:
    name: Deploy PostgreSQL
    runs-on: ubuntu-latest
    needs: pre-deploy-check
    if: ${{ github.event.inputs.deploy_postgres == 'true' }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Deploy PostgreSQL
        run: |
          echo "🚀 PostgreSQLをデプロイしています..."
          echo "環境: ${{ github.event.inputs.environment }}"
          # 実際のデプロイロジックをここに実装
          # 例: docker-compose up -d postgres
          echo "✅ PostgreSQLデプロイ完了"

  # ジョブ4: ベクトルDBデプロイ
  deploy-vector-db:
    name: Deploy Vector Database
    runs-on: ubuntu-latest
    needs: pre-deploy-check
    if: ${{ github.event.inputs.deploy_vector_db == 'true' }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Deploy Vector Database
        run: |
          echo "🚀 ベクトルDBをデプロイしています..."
          echo "環境: ${{ github.event.inputs.environment }}"
          # 実際のデプロイロジックをここに実装
          # 例: docker-compose up -d qdrant
          echo "✅ ベクトルDBデプロイ完了"

  # ジョブ5: データベースマイグレーション
  run-migrations:
    name: Run Database Migrations
    runs-on: ubuntu-latest
    needs: [deploy-postgres]
    if: ${{ github.event.inputs.run_migrations == 'true' }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[apps,dev]"
      
      - name: Run migrations
        run: |
          echo "🚀 データベースマイグレーションを実行しています..."
          # 実際のマイグレーションロジックをここに実装
          # 例: alembic upgrade head
          echo "✅ マイグレーション完了"

  # ジョブ6: デプロイ後確認
  post-deploy-check:
    name: Post-deployment Check
    runs-on: ubuntu-latest
    needs: [deploy-redis, deploy-postgres, deploy-vector-db, run-migrations]
    if: always()
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Health check
        run: |
          echo "🔍 ヘルスチェックを実行しています..."
          # 実際のヘルスチェックロジックをここに実装
          # 例: curl http://your-api-endpoint/health
          echo "✅ ヘルスチェック完了"
      
      - name: Deployment summary
        run: |
          echo "📊 デプロイメントサマリー"
          echo "環境: ${{ github.event.inputs.environment }}"
          echo "Redis: ${{ github.event.inputs.deploy_redis }}"
          echo "PostgreSQL: ${{ github.event.inputs.deploy_postgres }}"
          echo "Vector DB: ${{ github.event.inputs.deploy_vector_db }}"
          echo "Migrations: ${{ github.event.inputs.run_migrations }}"
          echo "✅ デプロイメント完了"
