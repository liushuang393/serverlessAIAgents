name: Lint

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[apps,dev]"

      - name: Run Ruff (format check)
        run: |
          ruff format --check .

      - name: Run Ruff (lint)
        run: |
          ruff check .

      - name: Architecture boundary check
        run: |
          python scripts/check_layer_boundaries.py
          python scripts/check_no_direct_provider_calls.py

      - name: Run mypy
        run: |
          mypy contracts infrastructure shared kernel harness control_plane domain apps tests
