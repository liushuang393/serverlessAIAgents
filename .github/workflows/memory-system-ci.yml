# 記憶システムCI/CDパイプライン
# 注意: 自動実行は無効化されています（workflow_dispatchのみ）
# 手動実行のみを許可しています

name: Memory System CI/CD

# 自動実行を無効化: workflow_dispatchのみを設定（手動実行のみ）
on:
  workflow_dispatch:
    inputs:
      run_tests:
        description: "テストを実行する"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      run_lint:
        description: "Lintを実行する"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      deploy_enabled:
        description: "デプロイを実行する（本番環境）"
        required: true
        default: "false"
        type: choice
        options:
          - "true"
          - "false"

env:
  PYTHON_VERSION: "3.13"

jobs:
  # ジョブ1: Lint（静的解析）
  lint:
    name: Lint and Type Check
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.run_lint == 'true' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[apps,dev]"

      - name: Run Ruff (format check)
        run: |
          ruff format --check .

      - name: Run Ruff (lint)
        run: |
          ruff check .

      - name: Run mypy (type check)
        run: |
          mypy contracts infrastructure shared kernel harness control_plane domain apps tests

  # ジョブ2: テスト（単体テスト + 統合テスト）
  test:
    name: Test Suite
    runs-on: ${{ matrix.os }}
    if: ${{ github.event.inputs.run_tests == 'true' }}

    strategy:
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.13"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[apps,dev]"

      - name: Run memory system tests
        run: |
          pytest tests/memory/ -v --cov=shared.memory --cov=infrastructure.memory --cov-report=xml --cov-report=term-missing

      - name: Run distributed memory tests
        run: |
          pytest tests/memory/distributed/ -v --no-cov

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          flags: memory-system
          name: memory-system-coverage
          fail_ci_if_error: false

  # ジョブ3: セキュリティスキャン
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.run_tests == 'true' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install security tools
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit bandit safety

      - name: Run pip-audit (dependency vulnerability scan)
        run: |
          pip-audit
        continue-on-error: true

      - name: Run bandit (code security scan)
        run: |
          bandit -r shared infrastructure -f json -o bandit-report.json
        continue-on-error: true

      - name: Upload bandit report
        uses: actions/upload-artifact@v3
        with:
          name: bandit-report
          path: bandit-report.json

  # ジョブ4: デプロイ（本番環境）
  # 注意: デフォルトでは無効化されています
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [lint, test, security]
    if: ${{ github.event.inputs.deploy_enabled == 'true' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy notification
        run: |
          echo "🚀 デプロイを開始します..."
          echo "注意: 実際のデプロイロジックはここに実装してください"

      # 実際のデプロイステップはここに追加
      # 例: SSH接続、Docker push、Kubernetes apply など
