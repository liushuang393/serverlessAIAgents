[pytest]
minversion = 8.0
testpaths = tests
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto
addopts =
    --strict-markers
    --strict-config
    --cov=apps/Legacy_modernization_geo_platform
    --cov-report=term-missing
    --cov-report=html
    --cov-report=xml
    --cov-fail-under=0
    -v
markers =
    unit: Unit tests
    integration: Integration tests
    e2e: End-to-end tests
    real_llm: Opt-in tests that call real LLM providers
    slow: Slow tests
