# -*- coding: utf-8 -*-
# Decision Governance Engine - Agent Configuration v2.2
# 認知・門番・診断・道・法・術・器・検証の8層構造による意思決定支援システム

name: decision_governance_engine
version: "2.2.0"
description: |
  企業の意思決定を支援するマルチエージェントシステム v2.2。
  認知→門番→診断→道（本質）→法（戦略）→術（計画）→器（実装）→検証の8層で構造化された分析を提供。

  v2.2新機能:
  - CognitiveGateAgent（認知前処理）追加：評価対象・動機・評価軸・不可逆性を検査
  v2.0新機能:
  - ClarificationAgent（問題診断）追加：論理的な穴、暗黙の仮定、認知バイアスを特定
  - DaoAgent強化：因果齿轮による構造化、死穴（禁忌）分析

# Agent定義
agents:
  cognitive_gate:
    name: CognitiveGateAgent
    description: 認知前処理Agent - 道法術器の分析に入る前に認知的前提条件を検査
    class: apps.decision_governance_engine.agents.CognitiveGateAgent
    config:
      max_tokens: 400
      temperature: 0.2
      use_rag: false
    outputs:
      - proceed
      - missing_info
      - clarification_questions

  gatekeeper:
    name: GatekeeperAgent
    description: 入口検証Agent - 不適格な問題を門前払い
    class: apps.decision_governance_engine.agents.GatekeeperAgent
    config:
      max_tokens: 300
      temperature: 0.1
      use_rag: false

  clarification:
    name: ClarificationAgent
    description: 問題診断Agent - 質問を深く診断し、論理的穴・暗黙の仮定・認知バイアスを特定
    class: apps.decision_governance_engine.agents.ClarificationAgent
    config:
      max_tokens: 600
      temperature: 0.3
      use_rag: false
    outputs:
      - restated_question
      - ambiguities
      - hidden_assumptions
      - cognitive_biases
      - refined_question

  dao:
    name: DaoAgent
    description: 本質判定Agent（道）v2.0 - 問題の本質を抽出、因果齿轮で構造化、死穴分析
    class: apps.decision_governance_engine.agents.DaoAgent
    config:
      max_tokens: 800
      temperature: 0.3
      use_rag: false
    outputs:
      - problem_type
      - essence
      - immutable_constraints
      - hidden_assumptions
      - causal_gears # NEW: 因果齿轮
      - bottleneck_gear # NEW: 瓶颈齿轮
      - death_traps # NEW: 死穴（禁忌）

  fa:
    name: FaAgent
    description: 戦略選定Agent（法）v2.0 - 稳健型 vs 激进型の対比を含む戦略パス評価
    class: apps.decision_governance_engine.agents.FaAgent
    config:
      max_tokens: 1200
      temperature: 0.4
      use_rag: false
      max_recommended_paths: 2
    outputs:
      - recommended_paths # 推奨パス（稳健型 + 激进型）
      - rejected_paths # 不推奨パス
      - decision_criteria # 判断基準
      - path_comparison # NEW: 比較マトリックス
    strategy_types:
      - CONSERVATIVE # 稳健型
      - AGGRESSIVE # 激进型
      - BALANCED # バランス型

  shu:
    name: ShuAgent
    description: 実行計画Agent（術）- 具体的な実行計画を策定
    class: apps.decision_governance_engine.agents.ShuAgent
    config:
      max_tokens: 1000
      temperature: 0.5
      use_rag: true
      rag_sources:
        - industry_practices
        - case_studies

  qi:
    name: QiAgent
    description: 技術実装Agent（器）- 技術的な実装方針を策定
    class: apps.decision_governance_engine.agents.QiAgent
    config:
      max_tokens: 1200
      temperature: 0.6
      use_rag: true
      rag_sources:
        - technical_docs
        - compliance

  review:
    name: ReviewAgent
    description: 検証Agent - 全層の結果を検証し最終判定
    class: apps.decision_governance_engine.agents.ReviewAgent
    config:
      max_tokens: 1500
      temperature: 0.7
      mandatory_checks:
        - 責任者が明確か
        - 最悪ケースの想定があるか
        - 撤退条件が定義されているか
        - 最初の一歩が明日実行可能か
        - 死穴（禁忌）が回避されているか # NEW

# Workflow定義
workflow:
  type: sequential
  pattern: multi_agent
  stages:
    - name: cognitive
      agent: cognitive_gate
      on_reject: request_clarification
      description: 認知前処理（評価対象・動機・評価軸・不可逆性検査）
    - name: gate
      agent: gatekeeper
      on_reject: terminate
    - name: diagnosis
      agent: clarification
      description: 問題診断（論理穴・仮定・バイアス特定）
    - name: essence
      agent: dao
      description: 本質分析 + 因果齿轮 + 死穴特定
    - name: strategy
      agent: fa
    - name: planning
      agent: shu
    - name: implementation
      agent: qi
    - name: verification
      agent: review
      on_coach: interactive_improvement # COACHの場合はユーザーと対話して改善指導
      on_revise: rollback # REVISEの場合は該当Agentに回退
      description: 検証 + コーチング型改善指導（REJECT廃止、課題があればCOACHモードで改善ループ）

# Studio UI（React Flow）用ノード定義
studio:
  enabled: true
  title: Decision Governance Engine v2.2
  description: 認知→門番→診断→道・法・術・器→検証による意思決定フロー
  nodes:
    - id: cognitive_gate
      type: agent
      label: 認知
      icon: "🧠"
      position: { x: 50, y: 200 }
      style:
        background: "#fef3c7"
        border: "#f59e0b"
    - id: gatekeeper
      type: agent
      label: 門番
      icon: "🚪"
      position: { x: 150, y: 200 }
      style:
        background: "#f3f4f6"
        border: "#374151"
    - id: clarification
      type: agent
      label: 診断
      icon: "🔍"
      position: { x: 200, y: 200 }
      style:
        background: "#fdf4ff"
        border: "#a855f7"
    - id: dao
      type: agent
      label: 道（本質）
      icon: "🎯"
      position: { x: 350, y: 200 }
      style:
        background: "#dbeafe"
        border: "#2563eb"
    - id: fa
      type: agent
      label: 法（戦略）
      icon: "⚖️"
      position: { x: 500, y: 200 }
      style:
        background: "#dcfce7"
        border: "#16a34a"
    - id: shu
      type: agent
      label: 術（計画）
      icon: "📋"
      position: { x: 650, y: 200 }
      style:
        background: "#fef3c7"
        border: "#d97706"
    - id: qi
      type: agent
      label: 器（実装）
      icon: "🔧"
      position: { x: 800, y: 200 }
      style:
        background: "#fce7f3"
        border: "#db2777"
    - id: review
      type: agent
      label: 検証
      icon: "✅"
      position: { x: 950, y: 200 }
      style:
        background: "#f0fdf4"
        border: "#15803d"
    - id: reject_exit
      type: output
      label: 拒否
      icon: "❌"
      position: { x: 100, y: 350 }
      style:
        background: "#fee2e2"
        border: "#dc2626"
    - id: report_output
      type: output
      label: レポート出力
      icon: "📄"
      position: { x: 950, y: 350 }
      style:
        background: "#e0f2fe"
        border: "#0284c7"
  edges:
    - source: cognitive_gate
      target: gatekeeper
      label: 通過
      condition: proceed
    - source: cognitive_gate
      target: reject_exit
      label: 補足要求
      condition: "!proceed"
      style:
        stroke: "#f59e0b"
        strokeDasharray: "5,5"
    - source: gatekeeper
      target: clarification
      label: 受理
      condition: is_acceptable
    - source: gatekeeper
      target: reject_exit
      label: 拒否
      condition: "!is_acceptable"
      style:
        stroke: "#dc2626"
        strokeDasharray: "5,5"
    - source: clarification
      target: dao
      label: 診断完了
    - source: dao
      target: fa
    - source: fa
      target: shu
    - source: shu
      target: qi
    - source: qi
      target: review
    - source: review
      target: report_output
      label: PASS
      condition: "verdict == PASS"
    - source: review
      target: clarification
      label: REVISE
      condition: "verdict == REVISE"
      style:
        stroke: "#d97706"
        strokeDasharray: "3,3"
    - source: review
      target: reject_exit
      label: REJECT
      condition: "verdict == REJECT"
      style:
        stroke: "#dc2626"
        strokeDasharray: "5,5"

# 出力設定
output:
  format: decision_report
  version: "2.0"
  include_sections:
    - executive_summary
    - clarification_diagnosis # NEW
    - dao_analysis
    - causal_gears # NEW
    - death_traps # NEW
    - fa_strategy
    - shu_plan
    - qi_implementation
    - review_findings
  signature_required: true

# RAG設定
rag:
  enabled: true
  sources:
    industry_practices:
      type: vector_store
      description: 業界ベストプラクティス
    case_studies:
      type: vector_store
      description: 過去の事例
    technical_docs:
      type: vector_store
      description: 技術ドキュメント
    compliance:
      type: vector_store
      description: コンプライアンス規定

# ログ設定
logging:
  level: INFO
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  handlers:
    - console
    - file
  file_path: logs/decision_engine.log
