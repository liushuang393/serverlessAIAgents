# ==============================================================================
# Decision Governance Engine - 開発用 Docker Compose オーバーライド
# ==============================================================================
# 使用方法:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up
#
# 前提:
#   - 必ず docker-compose.yml と一緒に使用すること（postgres-main, redis が必要）
#   - frontend / backend host / port は app_config.json または compose wrapper で注入すること
#
# 機能:
#   - バックエンド: uvicorn --reload（ホットリロード）
#   - フロントエンド: Vite dev server（プロキシ経由）
# ==============================================================================

services:
  # ---------------------------------------------------------------------------
  # バックエンド: 開発モード（docker-compose.yml の backend をオーバーライド）
  # ---------------------------------------------------------------------------
  backend:
    command:
      [
        "python",
        "-m",
        "kernel.runtime.uvicorn_launcher",
        "--config",
        "apps/decision_governance_engine/app_config.json",
        "--app",
        "apps.decision_governance_engine.api:app",
        "--host-env",
        "DGE_HOST",
        "--port-env",
        "DGE_PORT",
        "--reload",
        "--reload-dir",
        "apps/decision_governance_engine",
        "--reload-dir",
        "shared",
        "--reload-dir",
        "kernel",
        "--reload-dir",
        "harness",
        "--reload-dir",
        "control_plane",
        "--reload-dir",
        "domain",
      ]
    volumes:
      # ソースコードをマウント（リアルタイム反映、読み書き可能）
      - ../../contracts:/app/contracts
      - ../../infrastructure:/app/infrastructure
      - ../../shared:/app/shared
      - ../../kernel:/app/kernel
      - ../../harness:/app/harness
      - ../../control_plane:/app/control_plane
      - ../../domain:/app/domain
      - .:/app/apps/decision_governance_engine
    environment:
      # LLM 設定（ホストの環境変数をそのまま継承、値を上書きしない）
      - OPENAI_API_KEY
      - ANTHROPIC_API_KEY
      - GOOGLE_API_KEY
      - AZURE_OPENAI_API_KEY
      - AZURE_OPENAI_ENDPOINT
      # アプリ設定
      - LOG_LEVEL=DEBUG
      - ENABLE_RAG=${ENABLE_RAG:-true}
      # データベース設定（docker-compose.yml の postgres-main サービスを使用）
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-dge}:${POSTGRES_PASSWORD:-dge_password}@postgres-main:5432/${POSTGRES_DB:-decision_governance}
      - REDIS_URL=redis://redis:6379/0

  # ---------------------------------------------------------------------------
  # フロントエンド: 開発モード（docker-compose.yml の frontend をオーバーライド）
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "${FRONTEND_PORT}:${FRONTEND_PORT}"
    volumes:
      # ソースコードをマウント（ホットリロード用）
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - ./frontend/index.html:/app/index.html
      # 設定ファイルをマウント（変更を即座に反映）
      - ./frontend/vite.config.ts:/app/vite.config.ts
      - ./frontend/tailwind.config.js:/app/tailwind.config.js
      - ./frontend/postcss.config.js:/app/postcss.config.js
      - ./frontend/tsconfig.json:/app/tsconfig.json
    environment:
      - VITE_DEBUG_MODE=true
      - FRONTEND_HOST=${FRONTEND_HOST}
      - FRONTEND_PORT=${FRONTEND_PORT}
      - DGE_HOST=${DGE_HOST}
      - DGE_PORT=${DGE_PORT}
      # Vite dev server の proxy target（容器内部ネットワーク経由）
      # ※ VITE_ プレフィックスだとブラウザ側に注入されてしまうため、
      #    PROXY_TARGET を使用（vite.config.ts の process.env.PROXY_TARGET で参照）
      - PROXY_TARGET=http://backend:${DGE_PORT}
    healthcheck:
      # 開発モードは Vite dev server（5174）に対してヘルスチェックする
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://127.0.0.1:${FRONTEND_PORT}/",
        ]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
