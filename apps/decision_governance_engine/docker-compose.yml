# ==============================================================================
# Decision Governance Engine - Docker Compose
# ==============================================================================
# PostgreSQL + Redis + バックエンド + フロントエンド
#
# ポート設定:
#   - frontend / backend の host / port は compose wrapper が app_config.json から注入
#   - DB / Redis のポートのみ .env override を許容
#
# 使用方法:
#   開発（ホットリロード）:
#     conda run -n agentflow python scripts/compose.py publish
#
#   DB のみ起動:
#     docker-compose up -d postgres-main redis
#
#   本番（イメージビルド）:
#     docker-compose -f docker-compose.yml -f docker-compose.prod.yml up --build
#
#   停止:
#     conda run -n agentflow python scripts/compose.py stop
#
#   データ永続化解除（ボリューム削除）:
#     docker-compose down -v
# ==============================================================================

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL（決策履歴・ユーザー管理）
  # ---------------------------------------------------------------------------
  postgres-main:
    image: postgres:16-alpine
    container_name: dge-postgres-main
    ports:
      - "${DB_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-dge}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dge_password}
      POSTGRES_DB: ${POSTGRES_DB:-decision_governance}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_main_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-dge} -d ${POSTGRES_DB:-decision_governance}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - dge-network

  # ---------------------------------------------------------------------------
  # Redis（キャッシュ・セッション・リアルタイム通知）
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: dge-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: >
      redis-server
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    restart: unless-stopped
    networks:
      - dge-network

  # ---------------------------------------------------------------------------
  # バックエンド: FastAPI + Uvicorn
  # ---------------------------------------------------------------------------
  backend:
    build:
      context: ../..
      dockerfile: apps/decision_governance_engine/Dockerfile
    container_name: dge-backend
    command:
      [
        "python",
        "-m",
        "kernel.runtime.uvicorn_launcher",
        "--config",
        "apps/decision_governance_engine/app_config.json",
        "--app",
        "apps.decision_governance_engine.api:app",
        "--host-env",
        "DGE_HOST",
        "--port-env",
        "DGE_PORT",
      ]
    ports:
      - "${DGE_PORT}:${DGE_PORT}"
    environment:
      # LLM 設定（.env から読み込み）
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - AZURE_OPENAI_API_KEY=${AZURE_OPENAI_API_KEY:-}
      - AZURE_OPENAI_ENDPOINT=${AZURE_OPENAI_ENDPOINT:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - GEMINI_API_KEY=${GOOGLE_API_KEY:-}
      # アプリ設定
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - ENABLE_RAG=${ENABLE_RAG:-true}
      - DGE_HOST=${DGE_HOST}
      - DGE_PORT=${DGE_PORT}
      # データベース設定
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-dge}:${POSTGRES_PASSWORD:-dge_password}@postgres-main:5432/${POSTGRES_DB:-decision_governance}
      - REDIS_URL=redis://redis:6379/0
    volumes:
      # 開発時: ソースコードをマウント（ホットリロード用）
      - ../../contracts:/app/contracts:ro
      - ../../infrastructure:/app/infrastructure:ro
      - ../../shared:/app/shared:ro
      - ../../kernel:/app/kernel:ro
      - ../../harness:/app/harness:ro
      - ../../control_plane:/app/control_plane:ro
      - ../../domain:/app/domain:ro
      - .:/app/apps/decision_governance_engine:ro
      # 知識ベース
      - ./knowledge:/app/apps/decision_governance_engine/knowledge:ro
      # LLM Gateway 設定（ホスト側の .bizcore/llm_gateway.yaml を SSoT として使用）
      - ../../.bizcore/llm_gateway.yaml:/app/.bizcore/llm_gateway.yaml:ro
    depends_on:
      postgres-main:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          'import os, urllib.request; urllib.request.urlopen(f''http://localhost:{os.environ["DGE_PORT"]}/api/health'')',
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    networks:
      - dge-network

  # ---------------------------------------------------------------------------
  # フロントエンド: Nginx + React
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=${VITE_API_URL:-}
        - VITE_DEBUG_MODE=${VITE_DEBUG_MODE:-false}
    container_name: dge-frontend
    # ポートは各環境オーバーライドファイルで定義する:
    #   開発: docker-compose.dev.yml  → 5174
    #   本番: docker-compose.prod.yml → 80
    ports:
      - "${FRONTEND_PORT}:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://127.0.0.1/health",
        ]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    restart: unless-stopped
    networks:
      - dge-network

# ---------------------------------------------------------------------------
# ボリューム（データ永続化）
# ---------------------------------------------------------------------------
volumes:
  postgres_main_data:
    driver: local
  redis_data:
    driver: local

# ---------------------------------------------------------------------------
# ネットワーク
# ---------------------------------------------------------------------------
networks:
  dge-network:
    driver: bridge
