# ==============================================================================
# Decision Governance Engine - Nginx 本番設定
# ==============================================================================
# 用途:
#   - フロントエンド静的ファイル配信
#   - バックエンド API リバースプロキシ
#   - SSE（Server-Sent Events）ストリーミング対応
#
# 使用方法:
#   docker build -f Dockerfile -t dge-frontend .
#   docker run -p 80:80 dge-frontend
# ==============================================================================

# ワーカープロセス数（auto = CPU コア数）
worker_processes auto;

# エラーログ
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    # 同時接続数上限
    worker_connections 1024;
    
    # epoll を使用（Linux）
    use epoll;
    
    # 複数リクエストを一度に受け入れる
    multi_accept on;
}

http {
    # MIME タイプ設定
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ログフォーマット
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    # パフォーマンス最適化
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Gzip 圧縮
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript 
               application/rss+xml application/atom+xml image/svg+xml;

    # サーバーブロックは /etc/nginx/conf.d/ から読み込む
    # （Dockerfile の動的リゾルバーテンプレートで生成）
    include /etc/nginx/conf.d/*.conf;
}

