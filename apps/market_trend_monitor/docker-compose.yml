services:
  backend:
    build:
      context: ../..
      dockerfile: apps/market_trend_monitor/Dockerfile
      args:
        # PORT: コンテナ内部リッスンポート（Dockerfile ARG のデフォルトは 8002）
        - PORT=${PORT:-8002}
    container_name: market-trend-monitor-backend
    ports:
      # ホスト側ポート: API_PORT（デフォルト=PORT の値）:コンテナ内部ポート: PORT
      - "${API_PORT:-8002}:${PORT:-8002}"
    environment:
      - PORT=${PORT:-8002}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - DATABASE_URL=${DATABASE_URL:-sqlite:////app/apps/market_trend_monitor/data/market_trend.db}
      - MARKET_TREND_MONITOR_API_HOST=0.0.0.0
    volumes:
      - market-trend-data:/app/apps/market_trend_monitor/data
    # healthcheck は Dockerfile の HEALTHCHECK を継承（PORT 変数を使用）
    restart: unless-stopped

  frontend:
    build:
      context: ../..
      dockerfile: apps/market_trend_monitor/frontend/Dockerfile
      args:
        - VITE_API_BASE_URL=${VITE_API_BASE_URL:-/api}
    container_name: market-trend-monitor-frontend
    ports:
      - "${FRONTEND_PORT:-3002}:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  market-trend-data:
