# auth_service + FAQ 統合起動
# 使用方法: docker compose -f docker-compose.auth-faq.yml up --build -d
services:
  auth-service:
    build:
      context: .
      dockerfile: apps/auth_service/Dockerfile
    ports: ["8010:8010"]
    environment:
      AUTH_DB_SEED_DEFAULTS: "true"
      AUTH_DATABASE_URL: "sqlite+aiosqlite:///./data/auth_service.db"
      ALLOWED_ORIGINS: '["http://localhost:3010","http://localhost:8005"]'
      AUTHZ_EMBED_PERMISSIONS_IN_JWT: "true"
      AUTHZ_DEFAULT_OPEN: "true"
    volumes:
      - auth-data:/app/data
    networks: [app-network]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8010/health')"]
      interval: 10s
      timeout: 5s
      retries: 3

  faq-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: faq_system
      POSTGRES_USER: faq
      POSTGRES_PASSWORD: faq_password
    volumes:
      - faq-db-data:/var/lib/postgresql/data
    networks: [app-network]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U faq -d faq_system"]
      interval: 5s
      timeout: 3s
      retries: 5

  faq-qdrant:
    image: qdrant/qdrant:latest
    volumes:
      - faq-qdrant-data:/qdrant/storage
    networks: [app-network]

  faq-qdrant-confidential:
    image: qdrant/qdrant:latest
    ports:
      - "${FAQ_QDRANT_CONF_PORT:-6334}:6333"
    volumes:
      - faq-qdrant-conf-data:/qdrant/storage
    networks: [app-network]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3

  faq-backend:
    build:
      context: .
      dockerfile: apps/faq_system/Dockerfile
    ports: ["8005:8005"]
    environment:
      AUTH_SERVICE_URL: "http://auth-service:8010"
      AUTH_SERVICE_JWT_SECRET: "${JWT_SECRET_KEY}"
      FAQ_DATABASE_URL: "postgresql+asyncpg://faq:faq_password@faq-db:5432/faq_system"
      QDRANT_URL: "http://faq-qdrant:6333"
    depends_on:
      auth-service:
        condition: service_healthy
      faq-db:
        condition: service_healthy
      faq-qdrant:
        condition: service_started
    networks: [app-network]

  auth-admin:
    build:
      context: apps/auth_service/frontend
      dockerfile: Dockerfile
    ports: ["3010:80"]
    depends_on:
      auth-service:
        condition: service_healthy
    networks: [app-network]

networks:
  app-network:
    driver: bridge

volumes:
  auth-data:
  faq-db-data:
  faq-qdrant-data:
  faq-qdrant-conf-data:
