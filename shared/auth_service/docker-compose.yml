# ==============================================================================
# Auth Service - Docker Compose
# ==============================================================================
# スタンドアロン認証サービス（JWT / OAuth2 / LDAP / SAML / MFA）
#
# ポート設定:
#   API: 8010（デフォルト）
#   Admin UI: 3010（デフォルト）
#   DB: 5438 -> 5432（PostgreSQL）
#
# 使用方法:
#   本番（イメージビルド）:
#     docker compose up --build -d
#
#   停止:
#     docker compose down
#
#   ログ確認:
#     docker compose logs -f auth-service
# ==============================================================================

services:
  # ---------------------------------------------------------------------------
  # DB: PostgreSQL
  # ---------------------------------------------------------------------------
  auth-db:
    image: postgres:16-alpine
    container_name: auth-db
    environment:
      - POSTGRES_DB=${AUTH_DB_NAME:-auth_service}
      - POSTGRES_USER=${AUTH_DB_USER:-postgres}
      - POSTGRES_PASSWORD=${AUTH_DB_PASSWORD:-postgres}
    ports:
      - "${AUTH_DB_PORT:-5438}:5432"
    volumes:
      - auth-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${AUTH_DB_USER:-postgres} -d ${AUTH_DB_NAME:-auth_service}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped
    networks:
      - auth-network

  # ---------------------------------------------------------------------------
  # 認証サービス: FastAPI + Uvicorn
  # ---------------------------------------------------------------------------
  auth-service:
    build:
      context: ../..
      dockerfile: shared/auth_service/Dockerfile
      args:
        - PORT=${AUTH_SERVICE_PORT:-8010}
    container_name: auth-service
    ports:
      - "${AUTH_SERVICE_PORT:-8010}:8010"
    environment:
      # コア設定
      - AUTH_SERVICE_PORT=${AUTH_SERVICE_PORT:-8010}
      - AUTH_SERVICE_HOST=0.0.0.0
      - AUTH_DATABASE_URL=${AUTH_DATABASE_URL_DOCKER:-postgresql+asyncpg://${AUTH_DB_USER:-postgres}:${AUTH_DB_PASSWORD:-postgres}@auth-db:5432/${AUTH_DB_NAME:-auth_service}}
      - AUTH_DB_AUTO_CREATE=${AUTH_DB_AUTO_CREATE:-true}
      # JWT 設定
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-}
      - JWT_ALGORITHM=${JWT_ALGORITHM:-HS256}
      - JWT_ACCESS_EXPIRE_MINUTES=${JWT_ACCESS_EXPIRE_MINUTES:-30}
      - JWT_REFRESH_EXPIRE_DAYS=${JWT_REFRESH_EXPIRE_DAYS:-7}
      - JWT_ISSUER=${JWT_ISSUER:-auth-service}
      - JWT_AUDIENCE=${JWT_AUDIENCE:-auth-service}
      # 認証プロバイダー
      - AUTH_PROVIDER=${AUTH_PROVIDER:-local_db}
      # セキュリティ
      - MAX_LOGIN_ATTEMPTS=${MAX_LOGIN_ATTEMPTS:-5}
      - LOCKOUT_DURATION_MINUTES=${LOCKOUT_DURATION_MINUTES:-15}
      # CORS
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-["*"]}
      # 認可（Authorization）
      - AUTHZ_EMBED_PERMISSIONS_IN_JWT=${AUTHZ_EMBED_PERMISSIONS_IN_JWT:-true}
      - AUTHZ_DEFAULT_OPEN=${AUTHZ_DEFAULT_OPEN:-true}
      - AUTHZ_CACHE_TTL_SECONDS=${AUTHZ_CACHE_TTL_SECONDS:-300}
      # 開発モード
      - DEV_MODE=${DEV_MODE:-false}
      # OAuth2（省略可能）
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - AZURE_CLIENT_ID=${AZURE_CLIENT_ID:-}
      - AZURE_CLIENT_SECRET=${AZURE_CLIENT_SECRET:-}
      - AZURE_TENANT_ID=${AZURE_TENANT_ID:-}
    volumes:
      # 開発時: ソースコードをマウント（ホットリロード用）
      - ../../contracts:/app/contracts:ro
      - ../../infrastructure:/app/infrastructure:ro
      - ../../shared:/app/shared:ro
      - ../../kernel:/app/kernel:ro
      - ../../harness:/app/harness:ro
      - ../../control_plane:/app/control_plane:ro
      - ../../domain:/app/domain:ro
      - .:/app/shared/auth_service:ro
    depends_on:
      auth-db:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8010/health')",
        ]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped
    networks:
      - auth-network

  # ---------------------------------------------------------------------------
  # 管理画面（Auth Admin UI）
  # ---------------------------------------------------------------------------
  auth-admin:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: auth-admin
    ports:
      - "${AUTH_ADMIN_PORT:-3010}:80"
    depends_on:
      auth-service:
        condition: service_healthy
    healthcheck:
      # 127.0.0.1 を使用: localhost は IPv6 ::1 に解決される可能性があり不安定
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - auth-network

# ---------------------------------------------------------------------------
# ネットワーク
# ---------------------------------------------------------------------------
networks:
  auth-network:
    driver: bridge

# ---------------------------------------------------------------------------
# ボリューム
# ---------------------------------------------------------------------------
volumes:
  auth-db-data:
